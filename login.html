<!DOCTYPE html>
<html>
<head>
  <title>Tenthies Login 😏</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: black;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      width: 90%;
      max-width: 350px;
      background: #111;
      padding: 25px;
      border-radius: 15px;
      text-align: center;
    }

    input, button {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: none;
    }

    input {
      background: #222;
      color: white;
    }

    button {
      background: red;
      color: white;
      font-weight: bold;
    }

    .google {
      background: white;
      color: black;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Login kar bro 😏</h2>
  <p>Padhai nahi hoti, login karne aa gaye 🤡</p>

  <input id="phone" placeholder="+91XXXXXXXXXX">

  <div id="recaptcha"></div>

  <button onclick="sendOTP()">Send OTP 🔥</button>

  <input id="otp" placeholder="Enter OTP">

  <button onclick="verifyOTP()">Verify 😎</button>

  <hr>

  <button class="google" onclick="googleLogin()">Google se aa ja 😏</button>
</div>

<!-- 🔥 FIREBASE LOGIN SCRIPT -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, RecaptchaVerifier, signInWithPhoneNumber, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

// ✅ YOUR CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyAaCyAtAhmFdxznFfEcXiDWqAWbTnSRGtM",
  authDomain: "tenthies-2dd18.firebaseapp.com",
  projectId: "tenthies-2dd18",
  storageBucket: "tenthies-2dd18.firebasestorage.app",
  messagingSenderId: "950498558393",
  appId: "1:950498558393:web:70c8d43df49d747fba3668",
  measurementId: "G-TEVL8SZSBC"
};

// 🔥 INIT
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// 🔥 CAPTCHA
window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha', {
  size: 'normal',
});

// 📲 SEND OTP
window.sendOTP = function () {
  const phone = document.getElementById("phone").value;

  signInWithPhoneNumber(auth, phone, window.recaptchaVerifier)
    .then((confirmationResult) => {
      window.confirmationResult = confirmationResult;
      alert("OTP aa gaya 😎");
    })
    .catch((error) => {
      alert(error.message);
    });
};

// 🔐 VERIFY OTP
window.verifyOTP = function () {
  const code = document.getElementById("otp").value;

  confirmationResult.confirm(code)
    .then(() => {
      alert("Login success 🔥");
      window.location.href = "index.html";
    })
    .catch(() => {
      alert("Galat OTP 🤡");
    });
};

// 😎 GOOGLE LOGIN
window.googleLogin = function () {
  const provider = new GoogleAuthProvider();

  signInWithPopup(auth, provider)
    .then(() => {
      alert("Google login done 🔥");
      window.location.href = "index.html";
    })
    .catch((error) => {
      alert(error.message);
    });
};

</script>

</body>
</html>
